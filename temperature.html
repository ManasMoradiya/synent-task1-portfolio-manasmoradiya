<div class="converter">

    <h1>Temperature Converter</h1>

    <input
        type="text"
        id="tempInput"
        placeholder="Enter Temperature"
    >

    <select id="unit">

        <option value="celsius">
            Celsius
        </option>

        <option value="fahrenheit">
            Fahrenheit
        </option>

        <option value="kelvin">
            Kelvin
        </option>

    </select>

    <button onclick="convertTemp()">
        Convert
    </button>

    <div id="result"></div>

</div>

<script src="script.js"></script>

</body>
